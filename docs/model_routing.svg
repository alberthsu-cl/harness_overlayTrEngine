<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="680" viewBox="0 0 1560 680" role="img" aria-label="Model routing for the overlay transition harness">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .title { fill: #f3f4f6; font: 700 28px "Segoe UI", Arial, sans-serif; }
      .sub { fill: #cbd5e1; font: 500 16px "Segoe UI", Arial, sans-serif; }
      .box { fill: #161b22; stroke: #5b6470; stroke-width: 2; rx: 14; ry: 14; }
      .boxAccent { fill: #12263a; stroke: #60a5fa; stroke-width: 2.5; rx: 14; ry: 14; }
      .boxStrong { fill: #1a1f2e; stroke: #a78bfa; stroke-width: 2.5; rx: 14; ry: 14; }
      .label { fill: #e5e7eb; font: 600 18px "Segoe UI", Arial, sans-serif; }
      .small { fill: #cbd5e1; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .tag { fill: #38bdf8; font: 700 13px "Segoe UI", Arial, sans-serif; letter-spacing: 0.4px; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
      .arrowAccent { stroke: #60a5fa; stroke-width: 3; fill: none; marker-end: url(#arrowHeadAccent); }
      .arrowStrong { stroke: #a78bfa; stroke-width: 3; fill: none; marker-end: url(#arrowHeadStrong); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
    </marker>
    <marker id="arrowHeadAccent" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa" />
    </marker>
    <marker id="arrowHeadStrong" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1560" height="680" />
  <text class="title" x="40" y="46">Model Routing</text>
  <text class="sub" x="40" y="74">Which model participates at each stage, and where deterministic harness logic stays in control</text>

  <rect class="boxAccent" x="40" y="120" width="240" height="108" />
  <text class="label" x="160" y="156" text-anchor="middle">Transition Analysis</text>
  <text class="small" x="160" y="182" text-anchor="middle">vision + reasoning model</text>
  <text class="small" x="160" y="202" text-anchor="middle">identify likely effect family</text>

  <rect class="box" x="330" y="120" width="230" height="108" />
  <text class="label" x="445" y="156" text-anchor="middle">Planner</text>
  <text class="small" x="445" y="182" text-anchor="middle">deterministic rules</text>
  <text class="small" x="445" y="202" text-anchor="middle">retrieve before generate</text>

  <rect class="boxAccent" x="620" y="120" width="250" height="108" />
  <text class="label" x="745" y="156" text-anchor="middle">Effect Spec Generation</text>
  <text class="small" x="745" y="182" text-anchor="middle">coding-capable model</text>
  <text class="small" x="745" y="202" text-anchor="middle">constrained JSON spec only</text>

  <rect class="boxStrong" x="930" y="120" width="240" height="108" />
  <text class="label" x="1050" y="156" text-anchor="middle">Validation Gate</text>
  <text class="small" x="1050" y="182" text-anchor="middle">schema + render checks</text>
  <text class="small" x="1050" y="202" text-anchor="middle">rejects invalid candidates</text>

  <rect class="boxStrong" x="1210" y="120" width="300" height="108" />
  <text class="label" x="1360" y="156" text-anchor="middle">Future C++/HLSL Codegen</text>
  <text class="small" x="1360" y="182" text-anchor="middle">strong coding model</text>
  <text class="small" x="1360" y="202" text-anchor="middle">only after compile/render gate</text>

  <rect class="box" x="140" y="300" width="240" height="108" />
  <text class="label" x="260" y="336" text-anchor="middle">Retrieve Existing Effects</text>
  <text class="small" x="260" y="362" text-anchor="middle">no model</text>
  <text class="small" x="260" y="382" text-anchor="middle">catalog + similarity search</text>

  <rect class="box" x="470" y="300" width="240" height="108" />
  <text class="label" x="590" y="336" text-anchor="middle">Constrained Effect Grammar</text>
  <text class="small" x="590" y="362" text-anchor="middle">wipe, dissolve, mask, UV shift</text>
  <text class="small" x="590" y="382" text-anchor="middle">feathering, RGB split, noise</text>

  <rect class="boxAccent" x="800" y="300" width="270" height="108" />
  <text class="label" x="935" y="336" text-anchor="middle">effect_spec.json</text>
  <text class="small" x="935" y="362" text-anchor="middle">generated by model + rules</text>
  <text class="small" x="935" y="382" text-anchor="middle">stable contract for validation</text>

  <rect class="boxStrong" x="1120" y="300" width="300" height="108" />
  <text class="label" x="1270" y="336" text-anchor="middle">C++ / HLSL Source</text>
  <text class="small" x="1270" y="362" text-anchor="middle">future codegen target</text>
  <text class="small" x="1270" y="382" text-anchor="middle">compiled into OverlayTrPlugInFx.dll</text>

  <text class="tag" x="40" y="260">current Milestone 1 and 2 boundary</text>
  <text class="tag" x="1120" y="260">future Milestone 4+</text>

  <path class="arrowAccent" d="M 280 174 L 330 174" />
  <path class="arrow" d="M 560 174 L 620 174" />
  <path class="arrowStrong" d="M 870 174 L 930 174" />
  <path class="arrowStrong" d="M 1170 174 L 1210 174" />

  <path class="arrow" d="M 260 228 L 260 300" />
  <path class="arrow" d="M 590 228 L 590 300" />
  <path class="arrowAccent" d="M 935 228 L 935 300" />
  <path class="arrowStrong" d="M 1270 228 L 1270 300" />

  <path class="arrowAccent" d="M 380 354 L 470 354" />
  <path class="arrow" d="M 710 354 L 800 354" />
  <path class="arrowStrong" d="M 1070 354 L 1120 354" />

  <text class="small" x="40" y="470">Model involvement should be narrow and gated: analysis and spec generation first, codegen only after renderable validation exists.</text>
  <text class="small" x="40" y="496">The planner and validator stay deterministic so the model cannot bypass retrieval or safety checks.</text>
  <text class="small" x="40" y="522">Use the strongest reasoning/coding model you have available, but keep the output constrained to the grammar and schemas.</text>
</svg>
